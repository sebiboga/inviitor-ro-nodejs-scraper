name: Recovery from DISASTER

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Check only without making changes'
        required: true
        default: 'true'

jobs:
  verify-inviitor-companies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Verify inviitor.ro companies in Solr
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          echo "=== inviitor.ro Companies in Solr ==="
          curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=group:inviitor.ro&wt=json&rows=100" | \
            jq '.response.docs[] | {company, cif, brand, status, lastScraped}'
          echo ""
          echo "=== inviitor.ro Jobs in Solr ==="
          curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/job/select?q=source:inviitor.ro&wt=json&rows=5" | \
            jq '.response.numFound'
