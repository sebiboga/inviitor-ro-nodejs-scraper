name: inviitor.ro Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          MAX_PAGES: "1500"

      - name: Verify in Solr
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          echo "=== Verification ==="
          echo "Companies with group=inviitor.ro:"
          curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=group:inviitor.ro&wt=json&rows=100" | \
            jq '.response.numFound'
          
          echo ""
          echo "Jobs with source=inviitor.ro:"
          curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/job/select?q=source:inviitor.ro&wt=json&rows=0" | \
            jq '.response.numFound'
          
          echo ""
          echo "✅ Verification complete"
