name: Automation Tests

on:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm run test:unit || echo "No unit tests yet"
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run Integration Tests
        run: npm run test:integration || echo "No integration tests yet"
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run E2E Tests
        run: npm run test:e2e || echo "No e2e tests yet"
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
